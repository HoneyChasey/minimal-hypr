wallpaper {
  monitor = # Change to your monitor you would like the wallapper to be set on. Use hyprctl monitors to identify your monitors. Blank if your want all monitor have the same wallpaper
  path = CHANGEME # Change path to an image file or a directory containing images files. 
  fit_mode = cover 
}

