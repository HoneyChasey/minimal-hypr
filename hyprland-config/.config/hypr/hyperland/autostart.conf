#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

exec-once = $terminal
# exec-once = nm-applet &

exec-once = waybar # Application for the status bar. Include also the workspace overview. Find config in ~/.config/waybar/. Don't need to launch at the begining we enable this service.
exec-once = hyprpaper # Application for desktop manager
