# This files include other files in folder hyperland. 

# --------------------------------------------------------------
# READ THIS !!!!!!!! 
# Always declare variables before using them (like in programming), Hyprland reads a file from top to bottom — this also applies to source includes, as including a file is like pasting its content at that exact line, so make sure to include your files in the right order.
# --------------------------------------------------------------

# Environement vairalbes 

# Displays 
source = monitors.conf # config your monitors. Generated by nwg-displays. 
source = workspaces.conf # config generated by nwg-displays. 

# Defaults 
source = hyperland/general.conf # general conf. (not using for now)
source = hyperland/rules.conf  # rules in general like the window or else.
source = hyperland/keywords.conf # contains all program i use and call in other conf file ($variable_name). 
source = hyperland/keybinds.conf # keybinding conf. 
source = hyperland/autostart.conf # autostart necessaru process or not. 
source = hyperland/env.conf # contains all env variable.
source = hyperland/apparence.conf # configuration file for visual appearance and styling (gaps, borders, animations, and decorations).
source = hyperland/input.conf  # configuration file for input conf and gesture. 
source = hyperland/permissions.conf # configuration file for permissions. 

